<svg width="680" height="372" viewBox="0 0 680 372" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Peau de verre, 3 leviers</title>
<desc>La glass skin vient de trois leviers : une surface lisse (exfoliation, levier n°1), de l'eau retenue (humectants), et une barriere intacte (ceramides, niacinamide).</desc>
<rect x="4" y="4" width="672" height="364" rx="20" fill="#f6f7f2" stroke="#dde2d6" stroke-width="1.5"/>
<g font-family="ui-sans-serif, system-ui, sans-serif">
<circle cx="46" cy="50" r="5" fill="#cbef4d"/>
<text x="60" y="55" font-size="13" letter-spacing="0.16em" fill="#5d6f64" font-family="ui-monospace, monospace">HYPE × DONNÉES</text>
<text x="40" y="96" font-size="27" font-weight="600" fill="#0f2b31">Peau de verre, 3 leviers</text>

<circle cx="62" cy="158" r="19" fill="#cbef4d"/>
<text x="62" y="164" font-size="16" font-weight="700" fill="#0f2b31" text-anchor="middle">1</text>
<text x="96" y="152" font-size="19" font-weight="600" fill="#0f2b31">Surface lisse<tspan font-size="12" font-weight="600" fill="#3f7d5f">  ·  le levier n°1</tspan></text>
<text x="96" y="176" font-size="14.5" fill="#5d6f64">Exfoliation : retirer les cellules mortes, lisser le grain.</text>

<circle cx="62" cy="236" r="19" fill="none" stroke="#0f2b31" stroke-width="1.6"/>
<text x="62" y="242" font-size="16" font-weight="700" fill="#0f2b31" text-anchor="middle">2</text>
<text x="96" y="230" font-size="19" font-weight="600" fill="#0f2b31">Eau retenue</text>
<text x="96" y="254" font-size="14.5" fill="#5d6f64">Humectants : acide hyaluronique, glycérine.</text>

<circle cx="62" cy="314" r="19" fill="none" stroke="#0f2b31" stroke-width="1.6"/>
<text x="62" y="320" font-size="16" font-weight="700" fill="#0f2b31" text-anchor="middle">3</text>
<text x="96" y="308" font-size="19" font-weight="600" fill="#0f2b31">Barrière intacte</text>
<text x="96" y="332" font-size="14.5" fill="#5d6f64">Céramides, niacinamide : garder l'eau dedans.</text>

<line x1="540" y1="130" x2="540" y2="340" stroke="#dde2d6" stroke-width="1.5"/>
<text x="566" y="150" font-size="13" fill="#5d6f64" font-family="ui-monospace, monospace">REFLET</text>
<path d="M566 175 H636" stroke="#0f2b31" stroke-width="2.5"/>
<path d="M576 198 l8 -16 M596 198 l8 -16 M616 198 l8 -16" stroke="#cbef4d" stroke-width="2.5" stroke-linecap="round"/>
<text x="566" y="250" font-size="13.5" fill="#5d6f64">La lumière ne se</text>
<text x="566" y="270" font-size="13.5" fill="#5d6f64">reflète que sur</text>
<text x="566" y="290" font-size="13.5" fill="#0f2b31" font-weight="600">une surface lisse.</text>
</g>
</svg>
